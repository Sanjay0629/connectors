server {
    listen 80;
    server_name _;

    # Redirect bare root to the app sub-path
    location = / {
        return 301 /connectors/;
    }

    # Proxy API requests to the backend (strip /connectors prefix)
    location /connectors/api/ {
        rewrite ^/connectors(/.*)$ $1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket connections (strip /connectors prefix)
    location /connectors/ws/ {
        rewrite ^/connectors(/.*)$ $1 break;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Proxy file uploads served by the backend static handler
    location /connectors/uploads/ {
        rewrite ^/connectors(/.*)$ $1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    # Serve the React SPA — all /connectors/* paths fall back to index.html
    location /connectors/ {
        root /usr/share/nginx/html;
        # The Vite build places files under /connectors/ inside the dist folder
        try_files $uri $uri/ /connectors/index.html;
    }
}
