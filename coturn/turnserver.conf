# coturn configuration for OrgChat WebRTC TURN relay.
# Deploy alongside docker-compose.prod.yml.
#
# Replace every <PLACEHOLDER> before running.

listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# Your server's public IP address
external-ip=117.55.227.238

realm=orgchat

# HMAC-SHA1 shared-secret auth (time-limited credentials).
# TURN_SECRET in backend-go/.env MUST equal this value.
use-auth-secret
static-auth-secret=<MUST_MATCH_TURN_SECRET_IN_BACKEND_ENV>

# Relay port range for media (expose this range in firewall: UDP 49152-65535)
min-port=49152
max-port=65535

log-file=/var/log/coturn/turnserver.log
no-cli
no-loopback-peers
no-multicast-peers
fingerprint
